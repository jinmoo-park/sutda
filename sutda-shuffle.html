<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>섯다 셔플</title>
<style>
  body {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; min-height:100vh; margin:0;
    background:#1a1a1a; font-family:sans-serif;
    user-select:none;
  }
  .hint { font-size:13px; color:#888; text-align:center; margin-top:12px; min-height:18px; }
  .perspective-wrap { perspective:700px; perspective-origin:50% 30%; }
  .stage { position:relative; width:80px; height:220px; transform-style:preserve-3d; }
  .card {
    position:absolute; width:54px; height:78px;
    border-radius:5px; left:50%; margin-left:-27px;
    box-sizing:border-box; background:#c0392b;
  }
  .card::before {
    content:''; position:absolute; inset:5px;
    border-radius:3px; border:1.5px solid rgba(255,255,255,0.25);
  }
  .card::after {
    content:''; position:absolute; inset:9px;
    border-radius:2px; border:1px solid rgba(255,255,255,0.15);
  }
  .btn {
    margin-top:20px; padding:10px 28px; border-radius:8px;
    border:1px solid #444; background:transparent; color:#ddd;
    font-size:14px; cursor:pointer;
  }
  .btn:hover { background:#2a2a2a; }
  .btn:active { transform:scale(0.98); }
</style>
</head>
<body>

<div class="perspective-wrap">
  <div class="stage" id="stage"></div>
</div>
<button class="btn" id="btn"
  onpointerdown="startShuffle(event)"
  onpointerup="stopShuffle(event)"
  onpointerleave="stopShuffle(event)">
  누르고 있으면 섞임
</button>
<div class="hint" id="hint">버튼을 꾹 누르세요</div>

<script>
const stage = document.getElementById('stage');
const btn   = document.getElementById('btn');
const hint  = document.getElementById('hint');

const N = 5;
const BASE_TOP = 50;
const GAP = 13;

let cards    = [];
let baseRots = [];
let shuffling = false;
let animFrame = null;
let phase = 'idle';
let phaseStart = 0;
let pickedIdx = 0;

function rnd(min, max) { return min + Math.random() * (max - min); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOut(t)   { return 1-(1-t)*(1-t); }

function buildDeck() {
  stage.innerHTML = '';
  cards = [];
  baseRots = [];
  for (let i = 0; i < N; i++) {
    const el = document.createElement('div');
    el.className = 'card';
    const rot = rnd(-2, 2);
    baseRots.push(rot);
    applyT(el, BASE_TOP - i*GAP, rot, 0, i+1, false);
    stage.appendChild(el);
    cards.push({ el });
  }
}

function applyT(el, top, rotZ, transZ, zi, lifted) {
  el.style.top    = top + 'px';
  el.style.zIndex = zi;
  el.style.transform = `rotate(${rotZ}deg) translateZ(${transZ}px)`;
  el.style.boxShadow = lifted
    ? '0 14px 28px rgba(0,0,0,0.5), 0 4px 8px rgba(0,0,0,0.3)'
    : `0 ${2 + (zi/N)*2}px 0 rgba(0,0,0,${0.18 + (1-zi/N)*0.15})`;
  const dark = Math.max(0, -transZ * 0.4);
  el.style.filter = dark > 0 ? `brightness(${Math.max(0.55, 1 - dark/100)})` : '';
}

// 페이즈 타이밍 비율
const T = {
  peek: 0.22,
  hold: 0.18,
  rise: 0.35,
  drop: 0.15,
  rest: 0.10,
};
const CYCLE = 820;

function pickNext() {
  pickedIdx = 1 + Math.floor(Math.random() * (N - 2));
  phase = 'peek';
  phaseStart = performance.now();
}

function tick(now) {
  if (!shuffling) return;
  const elapsed = now - phaseStart;

  // ── PEEK: y축으로 살짝만 빠짐, z축은 그대로 (위 카드들에 덮혀있음) ──
  if (phase === 'peek') {
    const t  = Math.min(elapsed / (CYCLE * T.peek), 1);
    const et = easeInOut(t);

    const picked = cards[pickedIdx];
    applyT(picked.el,
      BASE_TOP - pickedIdx*GAP + GAP*1.2*et,
      baseRots[pickedIdx] + 1.5*et,
      0,
      pickedIdx + 1, // zIndex 원래 레이어 유지 — 위 카드에 덮혀있어야 함
      false
    );

    cards.forEach((c, i) => {
      if (i === pickedIdx) return;
      applyT(c.el, BASE_TOP - i*GAP, baseRots[i], 0, i+1, false);
    });

    if (t >= 1) { phase = 'hold'; phaseStart = now; }

  // ── HOLD: 삐져나온 상태 정지 유지 ──
  } else if (phase === 'hold') {
    if ((now - phaseStart) >= CYCLE * T.hold) {
      phase = 'rise';
      phaseStart = now;
    }

  // ── RISE: z축 앞으로 + y축 위로 솟구침, 비로소 위 카드들 위로 올라옴 ──
  } else if (phase === 'rise') {
    const t  = Math.min((now - phaseStart) / (CYCLE * T.rise), 1);
    const et = easeInOut(t);

    const picked = cards[pickedIdx];
    const fromTop = BASE_TOP - pickedIdx*GAP + GAP*1.2;
    const toTop   = BASE_TOP - (N-1)*GAP - 10;
    const zArc    = Math.sin(t * Math.PI) * 32;
    const toRot   = rnd(-2, 2);
    applyT(picked.el,
      fromTop + (toTop - fromTop) * et,
      baseRots[pickedIdx] + 1.5 + (toRot - baseRots[pickedIdx] - 1.5) * et,
      zArc,
      10, // 최상위 zIndex — 위 카드들 앞으로
      true
    );

    // 맨 위 카드: z 뒤로 물러나며 한 단 내려옴
    const topC = cards[N-1];
    applyT(topC.el,
      BASE_TOP - (N-1)*GAP + GAP*et,
      baseRots[N-1],
      -38 * Math.sin(t * Math.PI * 0.9),
      N+1,
      false
    );

    // 나머지: 빈 자리 채움
    cards.forEach((c, i) => {
      if (i === pickedIdx || i === N-1) return;
      const fromPos = BASE_TOP - i*GAP;
      const toPos   = i < pickedIdx ? fromPos : BASE_TOP - (i-1)*GAP;
      applyT(c.el, fromPos + (toPos - fromPos)*et, baseRots[i], 0, i+1, false);
    });

    if (t >= 1) {
      const p = cards.splice(pickedIdx, 1)[0];
      cards.push(p);
      baseRots[N-1] = rnd(-2, 2);
      phase = 'drop';
      phaseStart = now;
    }

  // ── DROP: 오버슈트 후 착지 ──
  } else if (phase === 'drop') {
    const t  = Math.min((now - phaseStart) / (CYCLE * T.drop), 1);
    const et = easeOut(t);
    const c  = cards[N-1];
    applyT(c.el,
      BASE_TOP - (N-1)*GAP - 10 + 10*et,
      baseRots[N-1],
      8*(1-et),
      N,
      t < 0.5
    );
    cards.forEach((c2, i) => {
      if (i === N-1) return;
      applyT(c2.el, BASE_TOP - i*GAP, baseRots[i], 0, i+1, false);
    });
    if (t >= 1) { phase = 'rest'; phaseStart = now; }

  } else if (phase === 'rest') {
    if ((now - phaseStart) > CYCLE * T.rest) pickNext();
  }

  animFrame = requestAnimationFrame(tick);
}

function restAll() {
  cards.forEach((c, i) => {
    applyT(c.el, BASE_TOP - i*GAP, baseRots[i] || 0, 0, i+1, false);
  });
}

function startShuffle(e) {
  btn.setPointerCapture(e.pointerId);
  if (shuffling) return;
  shuffling = true;
  hint.textContent = '섞는 중...';
  pickNext();
  animFrame = requestAnimationFrame(tick);
}

function stopShuffle() {
  shuffling = false;
  cancelAnimationFrame(animFrame);
  phase = 'idle';
  hint.textContent = '버튼을 꾹 누르세요';
  restAll();
  buildDeck();
}

buildDeck();
</script>
</body>
</html>
