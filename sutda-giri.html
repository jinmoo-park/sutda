<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>섯다 기리</title>
<style>
  body {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; min-height:100vh; margin:0;
    background:#1a1a1a; font-family:sans-serif;
    user-select:none;
  }
  .hint { font-size:12px; color:#888; text-align:center; margin-top:8px; min-height:18px; }
  .table { position:relative; width:320px; height:200px; }
  .pile-wrap { position:absolute; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .pile-label { font-size:10px; color:#666; height:14px; text-align:center; }
  .pile { position:relative; width:60px; cursor:grab; }
  .card {
    position:absolute; width:54px; height:78px;
    border-radius:5px; left:3px; box-sizing:border-box;
    background:#c0392b; border:0.5px solid rgba(0,0,0,0.2);
  }
  .card::before { content:''; position:absolute; inset:5px; border-radius:3px; border:1.5px solid rgba(255,255,255,0.25); }
  .card::after  { content:''; position:absolute; inset:9px;  border-radius:2px; border:1px solid rgba(255,255,255,0.15); }
  .pile.tappable { cursor:pointer; }
  .pile.tappable .card { outline:2px solid rgba(255,255,255,0.45); }
  .pile.tappable:hover .card { outline:2px solid rgba(255,255,255,0.75); }
  .order-num {
    position:absolute; top:-10px; right:-6px; z-index:99;
    width:18px; height:18px; border-radius:50%;
    background:#e67e22; color:white;
    font-size:10px; font-weight:500;
    display:flex; align-items:center; justify-content:center;
  }
  .btn-row { display:flex; gap:10px; margin-top:16px; }
  .btn {
    padding:8px 20px; border-radius:8px;
    border:1px solid #444; background:transparent; color:#ddd;
    font-size:13px; cursor:pointer;
  }
  .btn:hover { background:#2a2a2a; }
  .btn:disabled { opacity:0.35; cursor:not-allowed; }
</style>
</head>
<body>

<div class="table" id="table"></div>
<div class="hint" id="hint">더미를 드래그해서 떼어내세요</div>
<div class="btn-row">
  <button class="btn" id="btnReset">처음부터</button>
  <button class="btn" id="btnDone" disabled>합치기 완료</button>
</div>

<script>
const tableEl  = document.getElementById('table');
const hintEl   = document.getElementById('hint');
const btnDone  = document.getElementById('btnDone');
const btnReset = document.getElementById('btnReset');

const CARD_H = 78;
const GAP = 8;
const TOTAL = 8;
const DRAG_THRESHOLD = 8; // px — 이 이상 움직여야 드래그

let piles = [], phase = 'split', tapOrder = [];
let pointerStart = null;
let isDragging = false;
let ghost = null;
let cutCount = 0;

function rnd(a, b) { return a + Math.random() * (b - a); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function pileH(n) { return CARD_H + (n-1) * GAP; }

function init() {
  piles = [{ cards: TOTAL, x: 130, y: 20 }];
  phase = 'split'; tapOrder = [];
  btnDone.disabled = true;
  isDragging = false;
  pointerStart = null;
  if (ghost) { document.body.removeChild(ghost); ghost = null; }
  render();
  hintEl.textContent = '더미를 드래그해서 떼어내세요';
}

function render() {
  tableEl.innerHTML = '';
  piles.forEach((pile, pi) => {
    const wrap = document.createElement('div');
    wrap.className = 'pile-wrap';
    wrap.style.left = pile.x + 'px';
    wrap.style.top  = pile.y + 'px';

    const labelEl = document.createElement('div');
    labelEl.className = 'pile-label';
    wrap.appendChild(labelEl);

    const pileEl = document.createElement('div');
    pileEl.className = 'pile';
    pileEl.style.height = pileH(pile.cards) + 'px';

    if (phase === 'tap') {
      pileEl.classList.add('tappable');
      const orderIdx = tapOrder.indexOf(pi);
      if (orderIdx !== -1) {
        const badge = document.createElement('div');
        badge.className = 'order-num';
        badge.textContent = orderIdx + 1;
        pileEl.appendChild(badge);
      }
    }

    for (let i = 0; i < pile.cards; i++) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.top = (pile.cards - 1 - i) * GAP + 'px';
      card.style.zIndex = i + 1;
      card.style.transform = `rotate(${rnd(-1.5, 1.5).toFixed(2)}deg)`;
      card.style.boxShadow = `0 ${2+i}px 0 rgba(0,0,0,${0.12 + i*0.03})`;
      pileEl.appendChild(card);
    }

    pileEl.addEventListener('pointerdown', (e) => onPointerDown(e, pi));
    wrap.appendChild(pileEl);
    tableEl.appendChild(wrap);
  });
}

function onPointerDown(e, pi) {
  e.preventDefault();
  const pile = piles[pi];

  // 집은 Y 위치로 컷 장수 자동 결정
  const rect = e.currentTarget.getBoundingClientRect();
  const relY = e.clientY - rect.top;
  const ratio = relY / pileH(pile.cards);
  cutCount = Math.max(1, Math.min(pile.cards - 1, Math.round((1 - ratio) * pile.cards)));

  pointerStart = { x: e.clientX, y: e.clientY, pi };
  isDragging = false;

  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup', onPointerUp);
}

function onPointerMove(e) {
  if (!pointerStart) return;
  const dx = e.clientX - pointerStart.x;
  const dy = e.clientY - pointerStart.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (!isDragging && dist >= DRAG_THRESHOLD) {
    if (phase !== 'split') return;
    isDragging = true;
    spawnGhost(e);
  }

  if (isDragging && ghost) {
    ghost.style.left = (e.clientX - 30) + 'px';
    ghost.style.top  = (e.clientY - 20) + 'px';
  }
}

function spawnGhost(e) {
  ghost = document.createElement('div');
  ghost.style.cssText = `position:fixed;pointer-events:none;z-index:999;width:60px;opacity:0.92;`;
  ghost.style.height = pileH(cutCount) + 'px';
  for (let i = 0; i < cutCount; i++) {
    const c = document.createElement('div');
    c.className = 'card';
    c.style.top = (cutCount - 1 - i) * GAP + 'px';
    c.style.zIndex = i + 1;
    c.style.boxShadow = `0 14px 28px rgba(0,0,0,0.5), 0 ${2+i}px 0 rgba(0,0,0,0.15)`;
    ghost.appendChild(c);
  }
  ghost.style.left = (e.clientX - 30) + 'px';
  ghost.style.top  = (e.clientY - 20) + 'px';
  document.body.appendChild(ghost);

  // 원래 더미에서 즉시 차감
  piles[pointerStart.pi].cards -= cutCount;
  render();
}

function onPointerUp(e) {
  document.removeEventListener('pointermove', onPointerMove);
  document.removeEventListener('pointerup', onPointerUp);

  if (!pointerStart) return;
  const pi = pointerStart.pi;
  pointerStart = null;

  if (isDragging) {
    // ── 드래그 완료: 새 더미 드롭 ──
    isDragging = false;
    if (ghost) { document.body.removeChild(ghost); ghost = null; }

    const tableRect = tableEl.getBoundingClientRect();
    const dropX = Math.max(0, Math.min(260, e.clientX - tableRect.left - 30));
    const dropY = Math.max(0, Math.min(130, e.clientY - tableRect.top  - 20));

    piles.push({ cards: cutCount, x: dropX, y: dropY });

    if (piles.length >= 2) {
      hintEl.textContent = '계속 떼어내거나, 더미를 탭해서 합칠 순서를 정하세요';
    }
    render();

  } else {
    // ── 탭 완료 ──
    if (phase === 'split' && piles.length >= 2) {
      phase = 'tap';
      tapOrder = [];
      hintEl.textContent = '탭한 순서 = 아래부터 위 순서. 모든 더미를 탭하세요';
      render();
      return;
    }
    if (phase === 'tap') {
      onTapPile(pi);
    }
  }
}

function onTapPile(pi) {
  if (tapOrder.includes(pi)) {
    tapOrder = tapOrder.filter(i => i !== pi);
  } else {
    tapOrder.push(pi);
  }

  if (tapOrder.length === piles.length) {
    btnDone.disabled = false;
    hintEl.textContent = '순서 확정. "합치기 완료"를 누르세요';
  } else {
    btnDone.disabled = true;
    hintEl.textContent = `${tapOrder.length}/${piles.length} 선택됨`;
  }
  render();
}

btnDone.addEventListener('click', () => {
  if (tapOrder.length !== piles.length) return;
  phase = 'merging';
  btnDone.disabled = true;

  const mergedCards = tapOrder.reduce((s, pi) => s + piles[pi].cards, 0);
  const centerX = 130, centerY = 20;
  const duration = 380;
  const start = performance.now();
  const from = piles.map(p => ({ x: p.x, y: p.y }));

  function frame(now) {
    const t  = Math.min((now - start) / duration, 1);
    const et = easeInOut(t);
    tableEl.innerHTML = '';
    piles.forEach((pile, pi) => {
      const wrap = document.createElement('div');
      wrap.className = 'pile-wrap';
      wrap.style.left = (from[pi].x + (centerX - from[pi].x) * et) + 'px';
      wrap.style.top  = (from[pi].y + (centerY - from[pi].y) * et) + 'px';
      wrap.style.opacity = String(1 - et * 0.4);
      const pileEl = document.createElement('div');
      pileEl.className = 'pile';
      pileEl.style.height = pileH(pile.cards) + 'px';
      for (let i = 0; i < pile.cards; i++) {
        const c = document.createElement('div'); c.className = 'card';
        c.style.top = (pile.cards - 1 - i) * GAP + 'px'; c.style.zIndex = i + 1;
        c.style.boxShadow = `0 ${2+i}px 0 rgba(0,0,0,0.15)`;
        pileEl.appendChild(c);
      }
      wrap.appendChild(pileEl);
      tableEl.appendChild(wrap);
    });
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      piles = [{ cards: mergedCards, x: centerX, y: centerY }];
      phase = 'done'; tapOrder = [];
      render();
      hintEl.textContent = `기리 완료! (총 ${mergedCards}장) — 처음부터 다시 해보세요`;
    }
  }
  requestAnimationFrame(frame);
});

btnReset.addEventListener('click', init);
init();
</script>
</body>
</html>
